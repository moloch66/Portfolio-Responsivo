<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="spaceBg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0B0F1A"/>
    </radialGradient>
    <radialGradient id="nebula" cx="60%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#4FC3F7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4FC3F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaWarm" cx="30%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#spaceBg)"/>
  <rect width="800" height="500" fill="url(#nebula)"/>
  <rect width="800" height="500" fill="url(#nebulaWarm)"/>

  <!-- Stars — far layer -->
  <g fill="white">
    <circle cx="42" cy="18" r="0.8" opacity="0.4"/>
    <circle cx="130" cy="65" r="0.6" opacity="0.3"/>
    <circle cx="220" cy="30" r="0.9" opacity="0.5"/>
    <circle cx="310" cy="55" r="0.7" opacity="0.35"/>
    <circle cx="450" cy="20" r="0.8" opacity="0.45"/>
    <circle cx="560" cy="75" r="0.6" opacity="0.3"/>
    <circle cx="680" cy="35" r="1.0" opacity="0.5"/>
    <circle cx="760" cy="90" r="0.7" opacity="0.4"/>
    <circle cx="85" cy="140" r="0.6" opacity="0.3"/>
    <circle cx="195" cy="110" r="0.8" opacity="0.4"/>
    <circle cx="380" cy="130" r="0.7" opacity="0.35"/>
    <circle cx="520" cy="100" r="0.9" opacity="0.45"/>
    <circle cx="640" cy="155" r="0.6" opacity="0.3"/>
    <circle cx="730" cy="120" r="1.1" opacity="0.55"/>
    <circle cx="55" cy="390" r="0.7" opacity="0.35"/>
    <circle cx="145" cy="420" r="0.9" opacity="0.45"/>
    <circle cx="270" cy="380" r="0.6" opacity="0.3"/>
    <circle cx="490" cy="410" r="0.8" opacity="0.4"/>
    <circle cx="620" cy="395" r="1.0" opacity="0.5"/>
    <circle cx="750" cy="430" r="0.7" opacity="0.35"/>
    <circle cx="30" cy="290" r="0.8" opacity="0.4"/>
    <circle cx="170" cy="320" r="0.6" opacity="0.3"/>
    <circle cx="690" cy="280" r="0.9" opacity="0.45"/>
    <circle cx="780" cy="310" r="0.7" opacity="0.35"/>
  </g>

  <!-- Stars — near layer (brighter) -->
  <g fill="white" filter="url(#glow)">
    <circle cx="100" cy="50" r="1.5" opacity="0.7"/>
    <circle cx="350" cy="80" r="1.2" opacity="0.6"/>
    <circle cx="600" cy="45" r="1.8" opacity="0.8"/>
    <circle cx="720" cy="200" r="1.4" opacity="0.7"/>
    <circle cx="80" cy="350" r="1.6" opacity="0.75"/>
    <circle cx="700" cy="420" r="1.3" opacity="0.65"/>
  </g>

  <!-- Central glow -->
  <ellipse cx="400" cy="250" rx="200" ry="120" fill="#4FC3F7" fill-opacity="0.05" filter="url(#glow)"/>

  <!-- All content centered at cx=400 -->
  <g transform="translate(400, 250)">

    <!-- Pixel shuttle icon centered above text, pointing up -->
    <g filter="url(#glow)" transform="translate(0,-110)">
      <!-- Body -->
      <rect x="-18" y="-30" width="36" height="52" rx="8" fill="#4FC3F7"/>
      <!-- Cockpit window -->
      <ellipse cx="0" cy="-18" rx="10" ry="12" fill="#0B0F1A"/>
      <ellipse cx="-3" cy="-22" rx="4" ry="5" fill="#4FC3F7" opacity="0.35"/>
      <!-- Left fin -->
      <polygon points="-18,10 -34,36 -18,32" fill="#F59E0B"/>
      <!-- Right fin -->
      <polygon points="18,10 34,36 18,32" fill="#F59E0B"/>
      <!-- Engine exhaust glow -->
      <ellipse cx="0" cy="28" rx="10" ry="5" fill="#F59E0B" opacity="0.8"/>
      <ellipse cx="0" cy="36" rx="6" ry="4" fill="#FFF0CC" opacity="0.5"/>
    </g>

    <!-- STELLAR — warm white, monospace -->
    <text
      x="0" y="76"
      font-family="'Courier New', Courier, monospace"
      font-size="66"
      font-weight="700"
      fill="#FFF0CC"
      text-anchor="middle"
      letter-spacing="10"
      filter="url(#titleGlow)"
    >STELLAR</text>

    <!-- FIX — cyan accent -->
    <text
      x="0" y="138"
      font-family="'Courier New', Courier, monospace"
      font-size="66"
      font-weight="700"
      fill="#4FC3F7"
      text-anchor="middle"
      letter-spacing="22"
      filter="url(#titleGlow)"
    >FIX</text>

    <!-- Divider -->
    <line x1="-120" y1="155" x2="120" y2="155" stroke="#4FC3F7" stroke-opacity="0.25" stroke-width="1"/>

    <!-- Tagline -->
    <text
      x="0" y="176"
      font-family="'Courier New', Courier, monospace"
      font-size="11"
      fill="#9CA3AF"
      text-anchor="middle"
      letter-spacing="4"
    >PIXEL ART · UNITY 2D · GAME DESIGN</text>

  </g>
</svg>
