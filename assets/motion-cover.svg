<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- bg gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#04060e"/>
      <stop offset="60%"  stop-color="#0c0420"/>
      <stop offset="100%" stop-color="#040208"/>
    </linearGradient>
    <!-- cyan glow -->
    <radialGradient id="glow-c" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <!-- violet glow -->
    <radialGradient id="glow-v" cx="70%" cy="65%" r="38%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <!-- orange glow -->
    <radialGradient id="glow-o" cx="75%" cy="25%" r="30%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <!-- particle trail gradient -->
    <linearGradient id="trail1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f5ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="trail2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="60%" stop-color="#f97316" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="trail3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.7"/>
    </linearGradient>
    <!-- blob gradient -->
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.05"/>
    </radialGradient>
    <radialGradient id="blob2" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.02"/>
    </radialGradient>
    <!-- wave grid filter -->
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <!-- glow filter -->
    <filter id="glow-f" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip-main"><rect width="800" height="500" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#clip-main)">
    <!-- Background -->
    <rect width="800" height="500" fill="url(#bg)"/>

    <!-- Ambient glows -->
    <rect width="800" height="500" fill="url(#glow-c)"/>
    <rect width="800" height="500" fill="url(#glow-v)"/>
    <rect width="800" height="500" fill="url(#glow-o)"/>

    <!-- ── SCENE 1 HINT: Particle nodes (top-left region) ── -->
    <g opacity="0.75" filter="url(#glow-f)">
      <!-- nodes -->
      <circle cx="80" cy="120" r="3" fill="#00f5ff"/>
      <circle cx="140" cy="80"  r="2" fill="#22d3ee"/>
      <circle cx="200" cy="140" r="2.5" fill="#67e8f9"/>
      <circle cx="120" cy="180" r="2" fill="#00f5ff"/>
      <circle cx="175" cy="60"  r="1.5" fill="#22d3ee"/>
      <circle cx="60"  cy="180" r="2" fill="#38bdf8"/>
      <circle cx="230" cy="90"  r="2" fill="#00f5ff"/>
      <!-- connections -->
      <line x1="80" y1="120" x2="140" y2="80"  stroke="#00f5ff" stroke-width="0.7" opacity="0.45"/>
      <line x1="140" y1="80"  x2="200" y2="140" stroke="#22d3ee" stroke-width="0.7" opacity="0.35"/>
      <line x1="80"  y1="120" x2="120" y2="180" stroke="#00f5ff" stroke-width="0.7" opacity="0.40"/>
      <line x1="200" y1="140" x2="120" y2="180" stroke="#67e8f9" stroke-width="0.7" opacity="0.30"/>
      <line x1="140" y1="80"  x2="175" y2="60"  stroke="#22d3ee" stroke-width="0.5" opacity="0.35"/>
      <line x1="80"  y1="120" x2="60"  y2="180" stroke="#38bdf8" stroke-width="0.5" opacity="0.30"/>
      <line x1="200" y1="140" x2="230" y2="90"  stroke="#00f5ff" stroke-width="0.6" opacity="0.35"/>
      <line x1="140" y1="80"  x2="230" y2="90"  stroke="#22d3ee" stroke-width="0.5" opacity="0.25"/>
    </g>

    <!-- ── SCENE 2 HINT: Morphing blob shapes (center-left) ── -->
    <g transform="translate(220,200)" opacity="0.6">
      <ellipse cx="0" cy="0" rx="90" ry="75" fill="url(#blob1)" transform="rotate(-15)"/>
      <ellipse cx="-25" cy="-20" rx="55" ry="50" fill="url(#blob2)" transform="rotate(10)"/>
      <!-- blob outline shimmer -->
      <ellipse cx="0" cy="0" rx="90" ry="75" fill="none" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="6,8" transform="rotate(-15)"/>
      <!-- orbiting dots -->
      <circle cx="92" cy="0" r="2.5" fill="#c084fc" opacity="0.85" filter="url(#glow-f)"/>
      <circle cx="-64" cy="-64" r="2" fill="#818cf8" opacity="0.75" filter="url(#glow-f)"/>
      <circle cx="30" cy="78" r="2" fill="#a5b4fc" opacity="0.70" filter="url(#glow-f)"/>
      <circle cx="-90" cy="20" r="1.8" fill="#c084fc" opacity="0.65"/>
    </g>

    <!-- ── SCENE 3 HINT: Wave grid lines (center-right area) ── -->
    <g opacity="0.55" filter="url(#soft)">
      <!-- perspective grid rows -->
      <path d="M420,380 Q510,310 600,340 Q700,365 780,330" fill="none" stroke="#4f46e5" stroke-width="0.9" opacity="0.5"/>
      <path d="M430,350 Q520,285 605,315 Q698,338 775,308" fill="none" stroke="#6366f1" stroke-width="0.9" opacity="0.55"/>
      <path d="M445,320 Q530,260 615,290 Q700,315 775,285" fill="none" stroke="#818cf8" stroke-width="1.0" opacity="0.60"/>
      <path d="M460,292 Q542,238 625,265 Q705,292 775,262" fill="none" stroke="#a5b4fc" stroke-width="1.1" opacity="0.65"/>
      <path d="M480,265 Q558,216 638,242 Q712,268 775,242" fill="none" stroke="#c7d2fe" stroke-width="1.3" opacity="0.70"/>
      <!-- bright ridge -->
      <path d="M470,278 Q550,226 632,253 Q710,278 776,252" fill="none" stroke="#00f5ff" stroke-width="2" opacity="0.85" filter="url(#glow-strong)"/>
      <!-- vertical lines -->
      <line x1="500" y1="260" x2="460" y2="385" stroke="#6366f1" stroke-width="0.7" opacity="0.40"/>
      <line x1="545" y1="248" x2="512" y2="375" stroke="#818cf8" stroke-width="0.7" opacity="0.40"/>
      <line x1="590" y1="253" x2="568" y2="372" stroke="#818cf8" stroke-width="0.7" opacity="0.40"/>
      <line x1="635" y1="260" x2="620" y2="370" stroke="#6366f1" stroke-width="0.7" opacity="0.40"/>
      <line x1="678" y1="270" x2="668" y2="368" stroke="#6366f1" stroke-width="0.6" opacity="0.35"/>
      <line x1="718" y1="282" x2="712" y2="366" stroke="#4f46e5" stroke-width="0.6" opacity="0.35"/>
    </g>

    <!-- ── SCENE 4 HINT: Gravity orbs (top-right) ── -->
    <g filter="url(#glow-f)" opacity="0.8">
      <!-- main orbs -->
      <circle cx="640" cy="110" r="32" fill="#f97316" opacity="0.75"/>
      <circle cx="680" cy="155" r="20" fill="#fb923c" opacity="0.65"/>
      <circle cx="610" cy="148" r="15" fill="#fbbf24" opacity="0.60"/>
      <circle cx="700" cy="100" r="12" fill="#f97316" opacity="0.55"/>
      <!-- trail -->
      <path d="M620,100 C605,88 588,82 570,88" fill="none" stroke="#f97316" stroke-width="4" stroke-linecap="round" opacity="0.50"/>
      <path d="M666,140 C655,128 640,120 625,125" fill="none" stroke="#fb923c" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
    </g>

    <!-- ── SCENE 5 HINT: Flow field trails (bottom) ── -->
    <g opacity="0.65">
      <!-- rainbow flow trails -->
      <path d="M0,420 C80,395 160,430 240,405 C320,378 400,415 480,395 C560,374 640,408 720,388 C750,382 770,390 800,385" fill="none" stroke="url(#trail1)" stroke-width="1.5"/>
      <path d="M0,445 C70,415 150,455 230,430 C310,405 395,445 475,420 C555,395 635,432 720,410 C755,400 775,408 800,405" fill="none" stroke="url(#trail1)" stroke-width="1.2" opacity="0.7"/>
      <path d="M0,460 C90,435 170,465 260,442 C345,418 425,458 510,435 C595,410 670,448 760,428 C778,423 790,430 800,428" fill="none" stroke="url(#trail2)" stroke-width="1.0" opacity="0.6"/>
      <path d="M100,500 C160,468 220,488 290,470 C360,451 430,478 500,460 C580,440 650,466 730,450 C762,444 782,453 800,450" fill="none" stroke="url(#trail3)" stroke-width="1.2" opacity="0.55"/>
      <!-- particle dots on trails -->
      <circle cx="160" cy="415" r="2" fill="#00f5ff" opacity="0.85"/>
      <circle cx="330" cy="408" r="1.5" fill="#a855f7" opacity="0.80"/>
      <circle cx="500" cy="420" r="2" fill="#f97316" opacity="0.80"/>
      <circle cx="670" cy="410" r="1.5" fill="#22d3ee" opacity="0.75"/>
    </g>

    <!-- ── Center watermark / label ── -->
    <g opacity="0.90" filter="url(#glow-f)">
      <text x="400" y="235" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif"
            font-size="52" font-weight="700" letter-spacing="8" fill="none"
            stroke="url(#trail1)" stroke-width="0.8" opacity="0.6">MOTION</text>
      <text x="400" y="235" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif"
            font-size="52" font-weight="700" letter-spacing="8"
            fill="white" fill-opacity="0.08">MOTION</text>
    </g>

    <!-- Tags bottom-left -->
    <g transform="translate(24,440)">
      <rect width="90" height="24" rx="12" fill="rgba(0,245,255,0.12)" stroke="#00f5ff" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="45" y="16" text-anchor="middle" font-family="sans-serif" font-size="9.5" letter-spacing="1" fill="#00f5ff" fill-opacity="0.9">CANVAS 2D</text>
    </g>
    <g transform="translate(122,440)">
      <rect width="84" height="24" rx="12" fill="rgba(168,85,247,0.12)" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="42" y="16" text-anchor="middle" font-family="sans-serif" font-size="9.5" letter-spacing="1" fill="#a855f7" fill-opacity="0.9">PHYSICS</text>
    </g>
    <g transform="translate(214,440)">
      <rect width="72" height="24" rx="12" fill="rgba(249,115,22,0.12)" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="36" y="16" text-anchor="middle" font-family="sans-serif" font-size="9.5" letter-spacing="1" fill="#f97316" fill-opacity="0.9">NOISE</text>
    </g>
  </g>

  <!-- Card border -->
  <rect width="800" height="500" rx="16" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
</svg>
