<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- Background -->
    <radialGradient id="viveBg" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0D1018"/>
      <stop offset="100%" stop-color="#07080E"/>
    </radialGradient>

    <!-- Mint glow -->
    <filter id="mintGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft bloom -->
    <filter id="bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-15%" y="-10%" width="140%" height="135%">
      <feDropShadow dx="0" dy="20" stdDeviation="32" flood-color="#000" flood-opacity="0.65"/>
    </filter>

    <!-- Mint gradient (bars) -->
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B6BFF"/>
      <stop offset="100%" stop-color="#10F5A0"/>
    </linearGradient>

    <!-- Phone body gradient -->
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131923"/>
      <stop offset="100%" stop-color="#0D1018"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#viveBg)"/>

  <!-- Ambient orbs -->
  <ellipse cx="160" cy="250" rx="260" ry="200" fill="#10F5A0" fill-opacity="0.05" filter="url(#bloom)"/>
  <ellipse cx="580" cy="120" rx="180" ry="140" fill="#5B6BFF" fill-opacity="0.07" filter="url(#bloom)"/>

  <!-- Subtle grid lines -->
  <g stroke="#F2F5FF" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>

  <!-- ── VIVE Logo mark ── -->
  <g transform="translate(180, 230)" filter="url(#mintGlow)">
    <!-- Circle ring -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#10F5A0" stroke-width="1.5" stroke-opacity="0.4"/>
    <circle cx="0" cy="0" r="44" fill="#10F5A0" fill-opacity="0.1"/>
    <!-- EKG pulse line -->
    <polyline
      points="-30,0 -18,0 -10,-18 0,16 8,-10 16,8 24,0 38,0"
      fill="none" stroke="#10F5A0" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- VIVE wordmark -->
  <text x="180" y="316" text-anchor="middle"
    font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="16" font-weight="700" letter-spacing="6"
    fill="#10F5A0" fill-opacity="0.9">VIVE</text>
  <text x="180" y="334" text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="8" font-weight="400" letter-spacing="3"
    fill="#F2F5FF" fill-opacity="0.3">EXECUTIVE HEALTH</text>

  <!-- ── Left copy ── -->
  <text x="64" y="98" font-family="system-ui,sans-serif"
    font-size="8" font-weight="700" letter-spacing="4"
    fill="#10F5A0" fill-opacity="0.7">PRODUTO · HEALTHTECH</text>

  <text x="62" y="132" font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="38" font-weight="700" fill="#F2F5FF" fill-opacity="0.92">Plataforma</text>
  <text x="62" y="170" font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="38" font-weight="700" fill="#F2F5FF" fill-opacity="0.92">de Saúde</text>
  <text x="62" y="208" font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="38" font-weight="300" fill="#10F5A0" fill-opacity="0.9">Executive</text>

  <!-- Divider -->
  <line x1="62" y1="228" x2="230" y2="228" stroke="#10F5A0" stroke-opacity="0.2" stroke-width="1"/>

  <text x="62" y="252" font-family="system-ui,sans-serif"
    font-size="11" fill="#F2F5FF" fill-opacity="0.45" letter-spacing="0.3">PRD · Landing · Onboarding · Dashboard</text>

  <!-- Tags -->
  <rect x="62" y="272" width="88" height="22" rx="11"
    fill="#10F5A0" fill-opacity="0.1" stroke="#10F5A0" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="106" y="287" text-anchor="middle"
    font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#10F5A0">Product Design</text>

  <rect x="160" y="272" width="68" height="22" rx="11"
    fill="#5B6BFF" fill-opacity="0.1" stroke="#5B6BFF" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="194" y="287" text-anchor="middle"
    font-family="system-ui,sans-serif" font-size="9" font-weight="500" fill="#F2F5FF" fill-opacity="0.6">Healthtech</text>

  <rect x="62" y="302" width="46" height="22" rx="11"
    fill="#F2F5FF" fill-opacity="0.05" stroke="#F2F5FF" stroke-opacity="0.15" stroke-width="0.8"/>
  <text x="85" y="317" text-anchor="middle"
    font-family="system-ui,sans-serif" font-size="9" fill="#F2F5FF" fill-opacity="0.5">UX · UI</text>

  <rect x="118" y="302" width="42" height="22" rx="11"
    fill="#F2F5FF" fill-opacity="0.05" stroke="#F2F5FF" stroke-opacity="0.15" stroke-width="0.8"/>
  <text x="139" y="317" text-anchor="middle"
    font-family="system-ui,sans-serif" font-size="9" fill="#F2F5FF" fill-opacity="0.5">2026</text>

  <!-- ── Phone Mockup ── -->
  <g transform="translate(480, 42)" filter="url(#cardShadow)">
    <!-- Phone body -->
    <rect x="0" y="0" width="240" height="416" rx="34"
      fill="url(#phoneGrad)"
      stroke="#10F5A0" stroke-width="1" stroke-opacity="0.25"/>

    <!-- Screen -->
    <rect x="6" y="6" width="228" height="404" rx="29" fill="#07080E" fill-opacity="0.7"/>

    <!-- Dynamic island -->
    <rect x="88" y="14" width="64" height="22" rx="11" fill="#07080E"/>

    <!-- Status bar -->
    <text x="20" y="50" font-family="'Space Grotesk',system-ui,sans-serif" font-size="10" font-weight="600" fill="#F2F5FF" fill-opacity="0.5">9:41</text>

    <!-- Greeting -->
    <text x="20" y="76" font-family="system-ui,sans-serif" font-size="10" fill="#F2F5FF" fill-opacity="0.4">Bom dia,</text>
    <text x="20" y="96" font-family="'Space Grotesk',system-ui,sans-serif" font-size="20" font-weight="700" fill="#F2F5FF">Rafael.</text>

    <!-- Plan card -->
    <rect x="14" y="110" width="212" height="72" rx="14"
      fill="#131923" stroke="#10F5A0" stroke-width="0.8" stroke-opacity="0.3"/>
    <!-- Mint glow bg -->
    <ellipse cx="200" cy="130" rx="60" ry="40" fill="#10F5A0" fill-opacity="0.06"/>
    <text x="26" y="130" font-family="system-ui,sans-serif" font-size="8" font-weight="700" letter-spacing="2" fill="#10F5A0">VIVE EXECUTIVE</text>
    <text x="26" y="148" font-family="'Space Grotesk',system-ui,sans-serif" font-size="14" font-weight="600" fill="#F2F5FF">Plano Executive</text>
    <!-- Status -->
    <circle cx="26" cy="168" r="4" fill="#10F5A0"/>
    <text x="36" y="172" font-family="system-ui,sans-serif" font-size="9" fill="#10F5A0">Ativo · Renova Dez 2026</text>

    <!-- Quick action strip -->
    <rect x="14" y="194" width="46" height="46" rx="12" fill="#131923" stroke="#F2F5FF" stroke-opacity="0.06" stroke-width="1"/>
    <rect x="65" y="194" width="46" height="46" rx="12" fill="#131923" stroke="#F2F5FF" stroke-opacity="0.06" stroke-width="1"/>
    <rect x="116" y="194" width="46" height="46" rx="12" fill="#131923" stroke="#F2F5FF" stroke-opacity="0.06" stroke-width="1"/>
    <rect x="167" y="194" width="46" height="46" rx="12" fill="#131923" stroke="#F2F5FF" stroke-opacity="0.06" stroke-width="1"/>

    <!-- Action icons (simplified SVG) -->
    <!-- Calendar -->
    <rect x="28" y="205" width="18" height="16" rx="3" fill="none" stroke="#10F5A0" stroke-width="1.5"/>
    <line x1="28" y1="210" x2="46" y2="210" stroke="#10F5A0" stroke-width="1.5"/>
    <!-- Chat -->
    <path d="M70 205 h18 a2 2 0 0 1 2 2 v9 a2 2 0 0 1-2 2 h-6 l-4 3 v-3 h-8 a2 2 0 0 1-2-2 v-9 a2 2 0 0 1 2-2 z" fill="none" stroke="#5B6BFF" stroke-width="1.5"/>
    <!-- Shield -->
    <path d="M129 204 l8-3 8 3 v7 c0 5-8 9-8 9 s-8-4-8-9 z" fill="none" stroke="#F2F5FF" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Waveform -->
    <polyline points="172,217 176,217 178,212 181,222 183,214 185,219 187,217 192,217"
      fill="none" stroke="#10F5A0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="37" y="248" text-anchor="middle" font-family="system-ui" font-size="7" fill="#F2F5FF" fill-opacity="0.4">Agendar</text>
    <text x="88" y="248" text-anchor="middle" font-family="system-ui" font-size="7" fill="#F2F5FF" fill-opacity="0.4">Chat</text>
    <text x="139" y="248" text-anchor="middle" font-family="system-ui" font-size="7" fill="#F2F5FF" fill-opacity="0.4">Reemb.</text>
    <text x="190" y="248" text-anchor="middle" font-family="system-ui" font-size="7" fill="#F2F5FF" fill-opacity="0.4">Check</text>

    <!-- Benefits section -->
    <text x="20" y="270" font-family="system-ui,sans-serif" font-size="7" font-weight="700" letter-spacing="2" fill="#F2F5FF" fill-opacity="0.3">BENEFÍCIOS 2026</text>

    <!-- Médico 80% -->
    <text x="20" y="287" font-family="system-ui,sans-serif" font-size="9" fill="#F2F5FF" fill-opacity="0.6">Médico</text>
    <text x="218" y="287" text-anchor="end" font-family="'Space Grotesk',system-ui,sans-serif" font-size="9" font-weight="700" fill="#F59E0B">80%</text>
    <rect x="20" y="290" width="198" height="4" rx="2" fill="#F2F5FF" fill-opacity="0.05"/>
    <rect x="20" y="290" width="158" height="4" rx="2" fill="url(#mintGrad)" fill-opacity="0.8"/>

    <!-- Odonto 45% -->
    <text x="20" y="308" font-family="system-ui,sans-serif" font-size="9" fill="#F2F5FF" fill-opacity="0.6">Odontológico</text>
    <text x="218" y="308" text-anchor="end" font-family="'Space Grotesk',system-ui,sans-serif" font-size="9" font-weight="700" fill="#10F5A0">45%</text>
    <rect x="20" y="311" width="198" height="4" rx="2" fill="#F2F5FF" fill-opacity="0.05"/>
    <rect x="20" y="311" width="89" height="4" rx="2" fill="url(#mintGrad)"/>

    <!-- Mental 0% -->
    <text x="20" y="329" font-family="system-ui,sans-serif" font-size="9" fill="#F2F5FF" fill-opacity="0.6">Saúde Mental</text>
    <text x="218" y="329" text-anchor="end" font-family="'Space Grotesk',system-ui,sans-serif" font-size="9" font-weight="700" fill="#F2F5FF" fill-opacity="0.3">0%</text>
    <rect x="20" y="332" width="198" height="4" rx="2" fill="#F2F5FF" fill-opacity="0.05"/>

    <!-- Next appointment -->
    <rect x="14" y="346" width="212" height="44" rx="12"
      fill="#0D1018" stroke="#10F5A0" stroke-width="0.7" stroke-opacity="0.2"/>
    <text x="26" y="363" font-family="'Space Grotesk',system-ui,sans-serif" font-size="9" font-weight="600" fill="#10F5A0">Dra. Carla Mendes</text>
    <text x="26" y="378" font-family="system-ui,sans-serif" font-size="9" fill="#F2F5FF" fill-opacity="0.4">Cardiologia · Qui 17 Abr · 10h</text>

    <!-- Bottom bar -->
    <rect x="0" y="396" width="240" height="26" rx="0 0 29 29" fill="#07080E" fill-opacity="0.95"/>
    <rect x="101" y="404" width="38" height="3" rx="2" fill="#10F5A0" fill-opacity="0.4"/>
  </g>

</svg>
